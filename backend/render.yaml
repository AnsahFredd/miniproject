services:
  - type: web
    name: lawlens-backend
    env: python
    region: oregon  # or frankfurt, singapore, etc.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ENVIRONMENT
        sync: false
