services:
  - type: web
    name: lawlens-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: "bash -c 'PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port \$PORT'"
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ENVIRONMENT
        sync: false
