services:
  - type: web
    name: lawlens-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python app/main.py
    plan: free
    autoDeploy: true
    envVars:
      # PORT is automatically provided by Render - don't set it manually
      - key: SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ENVIRONMENT
        sync: false